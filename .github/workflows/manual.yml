# This file is generated from config/github_actions.yml.
# Run `python -m watchlist_signal_bot.github_actions` after changing that config.
# Do not edit this file manually.

name: "Manual Signal Bot Test"

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional single symbol filter"
        required: false
        type: "string"
      group:
        description: "Optional group filter"
        required: false
        type: "string"
      market:
        description: "Optional market filter"
        required: false
        default: "ALL"
        type: "choice"
        options:
          - ALL
          - KR
          - US
      dry_run:
        description: "Skip Telegram delivery"
        required: false
        default: true
        type: "boolean"
      publish_pages:
        description: "Deploy generated report to GitHub Pages"
        required: false
        default: false
        type: "boolean"

permissions:
  contents: "read"
  id-token: "write"
  pages: "write"

jobs:
  build:
    runs-on: "ubuntu-latest"
    env:
      SYMBOL: ${{ github.event.inputs.symbol }}
      GROUP: ${{ github.event.inputs.group }}
      MARKET: ${{ github.event.inputs.market || 'ALL' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"

      - name: "Setup uv"
        uses: "astral-sh/setup-uv@v5"
        with:
          version: "0.6.11"

      - name: "Install dependencies"
        run: "uv sync --group dev"

      - name: "Run Manual Signal Bot Test"
        shell: "bash"
        run: |
          set -euo pipefail
          cmd=(uv run python -m watchlist_signal_bot.main)
          "${cmd[@]}"

      - name: "Upload runtime artifacts"
        uses: "actions/upload-artifact@v4"
        with:
          name: "manual-signal-bot-artifacts"
          path: |
            artifacts
