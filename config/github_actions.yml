daily:
  schedule:
    - "0 0 * * 0"
  options:
    market:
      default: ALL
      choices:
        - ALL
        - KR
        - US
    dry_run:
      default: false
    publish_pages:
      default: true

manual:
  options:
    market:
      default: ALL
      choices:
        - ALL
        - KR
        - US
    dry_run:
      default: true
    publish_pages:
      default: false
