daily:
  schedule:
    - "35 7 * * 1-5"
    - "35 22 * * 1-5"
  options:
    market:
      default: ALL
      choices:
        - ALL
        - KR
        - US
    dry_run:
      default: false
    publish_pages:
      default: true

manual:
  options:
    market:
      default: ALL
      choices:
        - ALL
        - KR
        - US
    dry_run:
      default: true
    publish_pages:
      default: false
